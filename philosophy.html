    <h1 class="page-title">The philosophy of saving time</h1>
    <p class="prose">
      People tell me it's unnecessary to cut out x seconds of time, or x clicks. But these
      clicks are compounding, and by the end of the day, stretch a menial task into an
      arduous 8-hour one. What if we could reduce that completely?
