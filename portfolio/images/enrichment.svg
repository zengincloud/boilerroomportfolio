<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#0d0d0d"/>

  <!-- 4 tiers, small brain to galaxy brain -->
  <g font-family="'Arial Black', Impact, sans-serif" font-size="22" fill="#ffffff">

    <!-- tier 1 -->
    <g transform="translate(90,55)">
      <circle r="16" fill="none" stroke="#888888" stroke-width="4"/>
      <path d="M-16 0 Q-8 -10 0 0 Q8 -10 16 0" fill="none" stroke="#888888" stroke-width="3"/>
    </g>
    <text x="140" y="62">writing a to-do list</text>

    <!-- tier 2 -->
    <g transform="translate(90,155)">
      <circle r="24" fill="none" stroke="#7dd3fc" stroke-width="4"/>
      <path d="M-22 0 Q-11 -14 0 0 Q11 -14 22 0" fill="none" stroke="#7dd3fc" stroke-width="3"/>
    </g>
    <text x="140" y="162">using a shared calendar</text>

    <!-- tier 3 -->
    <g transform="translate(90,265)">
      <circle r="34" fill="none" stroke="#a78bfa" stroke-width="5"/>
      <path d="M-30 0 Q-15 -20 0 0 Q15 -20 30 0" fill="none" stroke="#a78bfa" stroke-width="3"/>
      <line x1="-45" y1="-10" x2="-55" y2="-20" stroke="#a78bfa" stroke-width="3"/>
      <line x1="45" y1="-10" x2="55" y2="-20" stroke="#a78bfa" stroke-width="3"/>
    </g>
    <text x="140" y="272">17 browser tabs and vibes</text>

    <!-- tier 4: galaxy brain -->
    <g transform="translate(90,385)">
      <circle r="46" fill="none" stroke="#ffd23f" stroke-width="6"/>
      <path d="M-40 0 Q-20 -26 0 0 Q20 -26 40 0" fill="none" stroke="#ffd23f" stroke-width="4"/>
      <line x1="-60" y1="0" x2="-80" y2="0" stroke="#ffd23f" stroke-width="3"/>
      <line x1="60" y1="0" x2="80" y2="0" stroke="#ffd23f" stroke-width="3"/>
      <line x1="-50" y1="-35" x2="-65" y2="-55" stroke="#ffd23f" stroke-width="3"/>
      <line x1="50" y1="-35" x2="65" y2="-55" stroke="#ffd23f" stroke-width="3"/>
      <line x1="0" y1="-50" x2="0" y2="-75" stroke="#ffd23f" stroke-width="3"/>
    </g>
    <text x="140" y="392" fill="#ffd23f">just asking an AI to do it</text>
  </g>

  <text x="400" y="430" text-anchor="middle" font-family="monospace" font-size="14" fill="#ffd23f" opacity="0.7">[ placeholder image — completely unrelated, sorry ]</text>
</svg>
