<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <pattern id="stripes-e" width="16" height="16" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#141414"/>
      <rect width="8" height="16" fill="#1e1e1e"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#stripes-e)"/>

  <!-- Apollo, mid-yeet, exiting stage left -->
  <g transform="translate(150,180) rotate(-25)">
    <rect x="-60" y="-40" width="120" height="80" rx="10" fill="#0d0d0d" stroke="#ff5d5d" stroke-width="5"/>
    <text x="0" y="8" text-anchor="middle" font-family="monospace" font-size="20" fill="#ff5d5d">apollo</text>
  </g>
  <g stroke="#ff5d5d" stroke-width="5">
    <line x1="230" y1="130" x2="290" y2="100"/>
    <line x1="230" y1="150" x2="300" y2="150"/>
    <line x1="230" y1="170" x2="290" y2="200"/>
  </g>
  <text x="260" y="90" font-family="monospace" font-size="24" fill="#ff5d5d">yeet!</text>

  <!-- Clay crate, walking in confidently -->
  <g transform="translate(560,200)">
    <rect x="-70" y="-50" width="140" height="100" rx="8" fill="#0d0d0d" stroke="#7dffb2" stroke-width="5"/>
    <line x1="-70" y1="-50" x2="70" y2="50" stroke="#7dffb2" stroke-width="3" opacity="0.4"/>
    <line x1="70" y1="-50" x2="-70" y2="50" stroke="#7dffb2" stroke-width="3" opacity="0.4"/>
    <text x="0" y="8" text-anchor="middle" font-family="monospace" font-size="26" fill="#7dffb2">clay</text>
  </g>

  <!-- a stray "300%" balloon because why not -->
  <text x="620" y="330" font-family="monospace" font-size="20" fill="#7dffb2" opacity="0.8">+300% meetings</text>

  <text x="400" y="410" text-anchor="middle" font-family="monospace" font-size="20" fill="#ffffff" opacity="0.8">
    PLACEHOLDER: APOLLO EXITS STAGE LEFT
  </text>
  <text x="400" y="30" text-anchor="middle" font-family="monospace" font-size="14" fill="#7dffb2" opacity="0.7">
    [ art department pending ]
  </text>
</svg>
