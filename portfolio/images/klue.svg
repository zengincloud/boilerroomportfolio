<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="225" fill="#2a1414"/>
  <rect y="225" width="800" height="225" fill="#132a17"/>
  <line x1="0" y1="225" x2="800" y2="225" stroke="#000000" stroke-width="4"/>

  <!-- top panel: disapproving -->
  <g transform="translate(140,110)">
    <circle r="34" fill="#e0b088"/>
    <path d="M-34 20 Q0 60 34 20 L34 90 L-34 90 Z" fill="#1b1b1b"/>
    <line x1="20" y1="-10" x2="70" y2="-40" stroke="#e0b088" stroke-width="10" stroke-linecap="round"/>
    <line x1="60" y1="-55" x2="80" y2="-25" stroke="#e0b088" stroke-width="10" stroke-linecap="round"/>
    <path d="M-14 -8 Q0 -18 14 -8" stroke="#000" stroke-width="4" fill="none"/>
  </g>
  <text x="460" y="120" font-family="'Arial Black', Impact, sans-serif" font-size="30" fill="#ffffff">reading the terms</text>
  <text x="460" y="155" font-family="'Arial Black', Impact, sans-serif" font-size="30" fill="#ffffff">and conditions</text>

  <!-- bottom panel: approving -->
  <g transform="translate(140,335)">
    <circle r="34" fill="#e0b088"/>
    <path d="M-34 20 Q0 60 34 20 L34 90 L-34 90 Z" fill="#1b1b1b"/>
    <line x1="20" y1="0" x2="75" y2="30" stroke="#e0b088" stroke-width="10" stroke-linecap="round"/>
    <path d="M-14 -8 Q0 2 14 -8" stroke="#000" stroke-width="4" fill="none"/>
  </g>
  <text x="460" y="330" font-family="'Arial Black', Impact, sans-serif" font-size="30" fill="#ffffff">clicking "I agree"</text>
  <text x="460" y="365" font-family="'Arial Black', Impact, sans-serif" font-size="30" fill="#ffffff">anyway</text>

  <text x="400" y="30" text-anchor="middle" font-family="monospace" font-size="14" fill="#7dd3fc" opacity="0.7">[ placeholder image — completely unrelated, sorry ]</text>
</svg>
