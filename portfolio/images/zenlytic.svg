<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <pattern id="stripes-z" width="16" height="16" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#141414"/>
      <rect width="8" height="16" fill="#1e1e1e"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#stripes-z)"/>

  <!-- flying email icons -->
  <g fill="none" stroke="#e8e04a" stroke-width="4">
    <g transform="translate(90,60) rotate(-12)">
      <rect width="90" height="60" rx="4" fill="#0d0d0d"/>
      <path d="M0 0 L45 35 L90 0"/>
    </g>
    <g transform="translate(610,40) rotate(10)">
      <rect width="90" height="60" rx="4" fill="#0d0d0d"/>
      <path d="M0 0 L45 35 L90 0"/>
    </g>
    <g transform="translate(650,300) rotate(-18)">
      <rect width="90" height="60" rx="4" fill="#0d0d0d"/>
      <path d="M0 0 L45 35 L90 0"/>
    </g>
    <g transform="translate(60,320) rotate(15)">
      <rect width="90" height="60" rx="4" fill="#0d0d0d"/>
      <path d="M0 0 L45 35 L90 0"/>
    </g>
  </g>

  <!-- stick figure, arms up, buried -->
  <g stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none">
    <circle cx="400" cy="160" r="30" fill="#0d0d0d"/>
    <line x1="400" y1="190" x2="400" y2="290"/>
    <line x1="400" y1="215" x2="345" y2="150"/>
    <line x1="400" y1="215" x2="455" y2="150"/>
    <line x1="400" y1="290" x2="360" y2="360"/>
    <line x1="400" y1="290" x2="440" y2="360"/>
  </g>
  <!-- panicked face -->
  <g stroke="#0d0d0d" stroke-width="4" fill="none">
    <circle cx="388" cy="155" r="3" fill="#0d0d0d"/>
    <circle cx="412" cy="155" r="3" fill="#0d0d0d"/>
    <path d="M388 172 Q400 165 412 172" />
  </g>

  <text x="400" y="410" text-anchor="middle" font-family="monospace" font-size="20" fill="#ffffff" opacity="0.8">
    PLACEHOLDER: REP GOING FERAL POST-CALL
  </text>
  <text x="400" y="30" text-anchor="middle" font-family="monospace" font-size="14" fill="#e8e04a" opacity="0.7">
    [ art department pending ]
  </text>
</svg>
