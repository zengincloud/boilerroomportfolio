<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#241010"/>

  <!-- flames -->
  <g fill="#ff6a2a">
    <polygon points="40,450 90,300 140,450"/>
    <polygon points="120,450 170,260 220,450"/>
    <polygon points="580,450 630,260 680,450"/>
    <polygon points="660,450 710,300 760,450"/>
  </g>
  <g fill="#ffb02a">
    <polygon points="60,450 90,340 120,450"/>
    <polygon points="600,450 630,340 660,450"/>
  </g>

  <!-- table -->
  <rect x="260" y="330" width="280" height="16" fill="#3a2a1a"/>
  <rect x="280" y="346" width="16" height="60" fill="#3a2a1a"/>
  <rect x="500" y="346" width="16" height="60" fill="#3a2a1a"/>

  <!-- dog -->
  <g transform="translate(400,270)">
    <circle r="55" fill="#d8a35c"/>
    <polygon points="-45,-40 -20,-70 -5,-30" fill="#d8a35c"/>
    <polygon points="45,-40 20,-70 5,-30" fill="#c98f43"/>
    <rect x="-30" y="-72" width="60" height="14" rx="4" fill="#2a2a2a"/>
    <rect x="-36" y="-64" width="72" height="8" fill="#2a2a2a"/>
    <circle cx="-18" cy="-5" r="4" fill="#000"/>
    <circle cx="18" cy="-5" r="4" fill="#000"/>
    <path d="M-20 15 Q0 25 20 15" stroke="#000" stroke-width="3" fill="none"/>
  </g>
  <!-- mug -->
  <rect x="410" y="320" width="30" height="26" rx="3" fill="#ffffff" opacity="0.9"/>

  <!-- speech bubble -->
  <g>
    <rect x="470" y="180" width="220" height="70" rx="14" fill="#ffffff"/>
    <polygon points="480,248 460,275 500,250" fill="#ffffff"/>
    <text x="580" y="222" text-anchor="middle" font-family="'Arial Black', Impact, sans-serif" font-size="26" fill="#000000">this is fine</text>
  </g>

  <text x="400" y="30" text-anchor="middle" font-family="monospace" font-size="14" fill="#ff6a2a" opacity="0.8">[ placeholder image — completely unrelated, sorry ]</text>
</svg>
